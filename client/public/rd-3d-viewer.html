<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图纸三维预览</title>
    <style>
      :root {
        color-scheme: light;
        --border: #d9e1ea;
        --bg: #f7f9fc;
        --panel: #ffffff;
        --text: #13243a;
        --muted: #5f6f84;
        --primary: #0f7b6c;
        --danger: #c0392b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body {
        padding: 16px;
      }

      .shell {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        gap: 12px;
        min-height: calc(100vh - 32px);
      }

      .header,
      .measure,
      .stage {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--panel);
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
      }

      .title {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .title h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.3;
      }

      .title p {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .btn {
        appearance: none;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
        transition: background-color 0.15s ease, border-color 0.15s ease;
      }

      .btn:hover {
        background: #f3f7fb;
        border-color: #c5d3e0;
      }

      .measure {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        padding: 12px;
      }

      .measure-item {
        border: 1px solid #edf2f7;
        border-radius: 12px;
        padding: 10px 12px;
        background: #fbfdff;
      }

      .measure-label {
        font-size: 12px;
        color: var(--muted);
      }

      .measure-value {
        margin-top: 6px;
        font-size: 16px;
        font-weight: 600;
      }

      .stage {
        position: relative;
        overflow: hidden;
        min-height: 420px;
      }

      #viewer {
        width: 100%;
        height: 100%;
        min-height: 420px;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(255, 255, 255, 0.92);
        text-align: center;
      }

      .overlay[hidden] {
        display: none;
      }

      .overlay-box {
        max-width: 520px;
      }

      .overlay-title {
        font-size: 18px;
        font-weight: 600;
      }

      .overlay-text {
        margin-top: 8px;
        font-size: 13px;
        line-height: 1.7;
        color: var(--muted);
        white-space: pre-wrap;
      }

      .overlay-text.error {
        color: var(--danger);
      }

      .tips {
        position: absolute;
        left: 12px;
        bottom: 12px;
        padding: 8px 12px;
        border-radius: 10px;
        font-size: 12px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(217, 225, 234, 0.9);
      }

      @media (max-width: 900px) {
        .header {
          flex-direction: column;
          align-items: stretch;
        }

        .actions {
          justify-content: flex-start;
        }

        .measure {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        body {
          padding: 12px;
        }

        .measure {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script src="https://unpkg.com/occt-import-js@0.0.23/dist/occt-import-js.js"></script>
  </head>
  <body>
    <div class="shell">
      <section class="header">
        <div class="title">
          <h1 id="title">三维图纸在线预览</h1>
          <p id="subtitle">同源预览已启用，优先兼容 STP / STEP 文件。</p>
        </div>
        <div class="actions">
          <button class="btn" id="fitBtn" type="button">适应视图</button>
          <button class="btn" id="frontBtn" type="button">正视图</button>
          <button class="btn" id="topBtn" type="button">俯视图</button>
          <button class="btn" id="rightBtn" type="button">右视图</button>
          <button class="btn" id="wireBtn" type="button">切换线框</button>
        </div>
      </section>

      <section class="measure">
        <div class="measure-item">
          <div class="measure-label">长度</div>
          <div class="measure-value" id="lengthValue">-</div>
        </div>
        <div class="measure-item">
          <div class="measure-label">宽度</div>
          <div class="measure-value" id="widthValue">-</div>
        </div>
        <div class="measure-item">
          <div class="measure-label">高度</div>
          <div class="measure-value" id="heightValue">-</div>
        </div>
        <div class="measure-item">
          <div class="measure-label">包络对角尺寸</div>
          <div class="measure-value" id="diagonalValue">-</div>
        </div>
      </section>

      <section class="stage">
        <div id="viewer"></div>
        <div class="overlay" id="loadingOverlay">
          <div class="overlay-box">
            <div class="overlay-title">正在载入三维文件</div>
            <div class="overlay-text" id="loadingText">正在解析模型，请稍候...</div>
          </div>
        </div>
        <div class="overlay" id="errorOverlay" hidden>
          <div class="overlay-box">
            <div class="overlay-title">三维预览失败</div>
            <div class="overlay-text error" id="errorText"></div>
          </div>
        </div>
        <div class="tips">
          鼠标左键旋转，滚轮缩放，右键平移。当前展示的是模型包络尺寸，适合做快速尺寸确认。
        </div>
      </section>
    </div>

    <script type="module">
      import * as THREE from "https://esm.sh/three@0.180.0";
      import { OrbitControls } from "https://esm.sh/three@0.180.0/examples/jsm/controls/OrbitControls.js";
      import { STLLoader } from "https://esm.sh/three@0.180.0/examples/jsm/loaders/STLLoader.js";
      import { OBJLoader } from "https://esm.sh/three@0.180.0/examples/jsm/loaders/OBJLoader.js";
      import { FBXLoader } from "https://esm.sh/three@0.180.0/examples/jsm/loaders/FBXLoader.js";
      import { GLTFLoader } from "https://esm.sh/three@0.180.0/examples/jsm/loaders/GLTFLoader.js";
      import { PLYLoader } from "https://esm.sh/three@0.180.0/examples/jsm/loaders/PLYLoader.js";
      import { TDSLoader } from "https://esm.sh/three@0.180.0/examples/jsm/loaders/TDSLoader.js";
      import { ThreeMFLoader } from "https://esm.sh/three@0.180.0/examples/jsm/loaders/3MFLoader.js";

      const params = new URLSearchParams(window.location.search);
      const fileUrl = params.get("file") || "";
      const fileName = params.get("name") || "未命名三维文件";
      const fileFormat = (params.get("format") || fileName.split(".").pop() || "").toLowerCase();

      const titleEl = document.getElementById("title");
      const subtitleEl = document.getElementById("subtitle");
      const loadingOverlay = document.getElementById("loadingOverlay");
      const loadingText = document.getElementById("loadingText");
      const errorOverlay = document.getElementById("errorOverlay");
      const errorText = document.getElementById("errorText");
      const viewerEl = document.getElementById("viewer");
      const lengthValueEl = document.getElementById("lengthValue");
      const widthValueEl = document.getElementById("widthValue");
      const heightValueEl = document.getElementById("heightValue");
      const diagonalValueEl = document.getElementById("diagonalValue");
      const fitBtn = document.getElementById("fitBtn");
      const frontBtn = document.getElementById("frontBtn");
      const topBtn = document.getElementById("topBtn");
      const rightBtn = document.getElementById("rightBtn");
      const wireBtn = document.getElementById("wireBtn");

      titleEl.textContent = fileName;
      subtitleEl.textContent = `${fileFormat.toUpperCase() || "3D"} 文件同源预览已启用，优先兼容 STP / STEP。`;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf7f9fc);

      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100000);
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      viewerEl.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;

      scene.add(new THREE.AmbientLight(0xffffff, 1.3));
      const mainLight = new THREE.DirectionalLight(0xffffff, 1.1);
      mainLight.position.set(80, 120, 140);
      scene.add(mainLight);
      const fillLight = new THREE.DirectionalLight(0xcfe6ff, 0.7);
      fillLight.position.set(-60, 90, -90);
      scene.add(fillLight);

      const grid = new THREE.GridHelper(260, 20, 0xd7e0e9, 0xe8edf2);
      scene.add(grid);

      const rootGroup = new THREE.Group();
      scene.add(rootGroup);

      let edgeVisible = true;
      let currentBox = null;

      function showError(message) {
        errorText.textContent = message;
        errorOverlay.hidden = false;
        loadingOverlay.hidden = true;
      }

      function clearError() {
        errorOverlay.hidden = true;
        errorText.textContent = "";
      }

      function setLoading(message) {
        loadingText.textContent = message;
        loadingOverlay.hidden = false;
      }

      function clearLoading() {
        loadingOverlay.hidden = true;
      }

      function formatSize(value) {
        if (!Number.isFinite(value)) return "-";
        return `${value.toFixed(2)} mm`;
      }

      function disposeNode(node) {
        node.traverse((child) => {
          if (child.geometry) {
            child.geometry.dispose();
          }
          if (Array.isArray(child.material)) {
            child.material.forEach((item) => item && item.dispose && item.dispose());
          } else if (child.material && child.material.dispose) {
            child.material.dispose();
          }
        });
      }

      function clearSceneModel() {
        while (rootGroup.children.length > 0) {
          const child = rootGroup.children[0];
          if (child) {
            rootGroup.remove(child);
            disposeNode(child);
          }
        }
        currentBox = null;
      }

      function addEdgeLine(targetMesh) {
        const edges = new THREE.EdgesGeometry(targetMesh.geometry);
        const line = new THREE.LineSegments(
          edges,
          new THREE.LineBasicMaterial({ color: 0x3d4e63, transparent: true, opacity: 0.45 }),
        );
        line.userData.isEdgeHelper = true;
        line.visible = edgeVisible;
        targetMesh.add(line);
      }

      function normalizeColor(colorArray) {
        if (!Array.isArray(colorArray) || colorArray.length < 3) {
          return new THREE.Color(0x3b82f6);
        }
        const [r, g, b] = colorArray;
        const max = Math.max(r, g, b);
        if (max > 1) {
          return new THREE.Color(r / 255, g / 255, b / 255);
        }
        return new THREE.Color(r, g, b);
      }

      function buildStandardMaterial(color) {
        return new THREE.MeshStandardMaterial({
          color,
          metalness: 0.08,
          roughness: 0.62,
          side: THREE.DoubleSide,
        });
      }

      function updateMeasure(box) {
        const size = new THREE.Vector3();
        box.getSize(size);
        lengthValueEl.textContent = formatSize(size.x);
        widthValueEl.textContent = formatSize(size.y);
        heightValueEl.textContent = formatSize(size.z);
        diagonalValueEl.textContent = formatSize(size.length());
      }

      function fitCamera(mode = "iso") {
        if (!currentBox) return;
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        currentBox.getSize(size);
        currentBox.getCenter(center);
        const maxSize = Math.max(size.x, size.y, size.z) || 1;
        const distance = maxSize * 2.2;

        if (mode === "front") {
          camera.position.set(center.x, center.y - distance, center.z);
        } else if (mode === "top") {
          camera.position.set(center.x, center.y, center.z + distance);
        } else if (mode === "right") {
          camera.position.set(center.x + distance, center.y, center.z);
        } else {
          camera.position.set(center.x + distance, center.y - distance, center.z + distance * 0.8);
        }

        camera.near = Math.max(distance / 1000, 0.1);
        camera.far = distance * 20;
        camera.updateProjectionMatrix();
        controls.target.copy(center);
        controls.update();
      }

      function finalizeModel(group) {
        clearSceneModel();
        rootGroup.add(group);
        currentBox = new THREE.Box3().setFromObject(rootGroup);
        if (currentBox.isEmpty()) {
          showError("模型已读取，但未解析出有效几何体。请优先上传标准 STP / STEP 文件。");
          return;
        }
        updateMeasure(currentBox);
        fitCamera("iso");
        clearLoading();
      }

      async function loadOcctModule() {
        if (typeof window.occtimportjs !== "function") {
          throw new Error("三维解析组件加载失败，请稍后重试。");
        }
        return window.occtimportjs({
          locateFile: (path) => `https://unpkg.com/occt-import-js@0.0.23/dist/${path}`,
        });
      }

      async function loadOccModel(kind) {
        setLoading(`正在解析 ${fileFormat.toUpperCase()} 模型，请稍候...`);
        const response = await fetch(fileUrl, { credentials: "same-origin" });
        if (!response.ok) {
          throw new Error("知识库文件读取失败，请确认文件已成功上传。");
        }
        const occt = await loadOcctModule();
        const buffer = new Uint8Array(await response.arrayBuffer());
        const params = {
          linearUnit: "millimeter",
          linearDeflectionType: "bounding_box_ratio",
          linearDeflection: 0.001,
          angularDeflection: 0.5,
        };

        const result =
          kind === "step"
            ? occt.ReadStepFile(buffer, params)
            : occt.ReadIgesFile(buffer, params);

        if (!result?.success || !Array.isArray(result.meshes) || result.meshes.length === 0) {
          throw new Error("模型解析失败，请优先使用标准 STP / STEP 文件。");
        }

        const group = new THREE.Group();
        result.meshes.forEach((meshData) => {
          const positionArray = meshData?.attributes?.position?.array || [];
          if (!Array.isArray(positionArray) || positionArray.length === 0) return;
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute("position", new THREE.Float32BufferAttribute(positionArray, 3));
          if (Array.isArray(meshData?.attributes?.normal?.array) && meshData.attributes.normal.array.length > 0) {
            geometry.setAttribute("normal", new THREE.Float32BufferAttribute(meshData.attributes.normal.array, 3));
          } else {
            geometry.computeVertexNormals();
          }
          if (Array.isArray(meshData?.index?.array) && meshData.index.array.length > 0) {
            geometry.setIndex(meshData.index.array);
          }
          geometry.computeBoundingBox();
          geometry.computeBoundingSphere();

          const mesh = new THREE.Mesh(
            geometry,
            buildStandardMaterial(normalizeColor(meshData.color)),
          );
          addEdgeLine(mesh);
          group.add(mesh);
        });
        return group;
      }

      async function loadWithThreeLoader(loader, transform) {
        setLoading(`正在读取 ${fileFormat.toUpperCase()} 文件，请稍候...`);
        return new Promise((resolve, reject) => {
          loader.load(
            fileUrl,
            (resource) => {
              try {
                resolve(transform(resource));
              } catch (error) {
                reject(error);
              }
            },
            undefined,
            () => reject(new Error("模型文件读取失败，请检查文件内容是否完整。")),
          );
        });
      }

      async function buildModel() {
        if (!fileUrl) {
          throw new Error("未找到可预览的文件地址。");
        }

        if (fileFormat === "stp" || fileFormat === "step") {
          return loadOccModel("step");
        }
        if (fileFormat === "igs" || fileFormat === "iges") {
          return loadOccModel("iges");
        }
        if (fileFormat === "stl") {
          const loader = new STLLoader();
          return loadWithThreeLoader(loader, (geometry) => {
            geometry.computeVertexNormals();
            const mesh = new THREE.Mesh(geometry, buildStandardMaterial(new THREE.Color(0x0f7b6c)));
            const group = new THREE.Group();
            addEdgeLine(mesh);
            group.add(mesh);
            return group;
          });
        }
        if (fileFormat === "obj") {
          const loader = new OBJLoader();
          return loadWithThreeLoader(loader, (object) => {
            object.traverse((child) => {
              if (child.isMesh) {
                child.material = buildStandardMaterial(new THREE.Color(0x0f7b6c));
                addEdgeLine(child);
              }
            });
            return object;
          });
        }
        if (fileFormat === "glb" || fileFormat === "gltf") {
          const loader = new GLTFLoader();
          return loadWithThreeLoader(loader, (resource) => {
            resource.scene.traverse((child) => {
              if (child.isMesh) {
                child.material = buildStandardMaterial(new THREE.Color(0x0f7b6c));
                addEdgeLine(child);
              }
            });
            return resource.scene;
          });
        }
        if (fileFormat === "fbx") {
          const loader = new FBXLoader();
          return loadWithThreeLoader(loader, (object) => {
            object.traverse((child) => {
              if (child.isMesh) {
                child.material = buildStandardMaterial(new THREE.Color(0x0f7b6c));
                addEdgeLine(child);
              }
            });
            return object;
          });
        }
        if (fileFormat === "ply") {
          const loader = new PLYLoader();
          return loadWithThreeLoader(loader, (geometry) => {
            geometry.computeVertexNormals();
            const mesh = new THREE.Mesh(geometry, buildStandardMaterial(new THREE.Color(0x0f7b6c)));
            const group = new THREE.Group();
            addEdgeLine(mesh);
            group.add(mesh);
            return group;
          });
        }
        if (fileFormat === "3ds") {
          const loader = new TDSLoader();
          return loadWithThreeLoader(loader, (object) => {
            object.traverse((child) => {
              if (child.isMesh) {
                child.material = buildStandardMaterial(new THREE.Color(0x0f7b6c));
                addEdgeLine(child);
              }
            });
            return object;
          });
        }
        if (fileFormat === "3mf") {
          const loader = new ThreeMFLoader();
          return loadWithThreeLoader(loader, (object) => {
            object.traverse((child) => {
              if (child.isMesh) {
                child.material = buildStandardMaterial(new THREE.Color(0x0f7b6c));
                addEdgeLine(child);
              }
            });
            return object;
          });
        }

        throw new Error("当前文件格式暂未接入本地三维预览，请优先上传 STP / STEP 文件。");
      }

      function toggleEdges() {
        edgeVisible = !edgeVisible;
        rootGroup.traverse((child) => {
          if (child.userData?.isEdgeHelper) {
            child.visible = edgeVisible;
          }
        });
      }

      function resize() {
        const width = viewerEl.clientWidth || 1;
        const height = viewerEl.clientHeight || 1;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height, false);
      }

      fitBtn.addEventListener("click", () => fitCamera("iso"));
      frontBtn.addEventListener("click", () => fitCamera("front"));
      topBtn.addEventListener("click", () => fitCamera("top"));
      rightBtn.addEventListener("click", () => fitCamera("right"));
      wireBtn.addEventListener("click", toggleEdges);
      window.addEventListener("resize", resize);

      resize();

      (async () => {
        clearError();
        try {
          const model = await buildModel();
          finalizeModel(model);
        } catch (error) {
          showError(
            error instanceof Error
              ? error.message
              : "模型预览失败，请优先上传 STP / STEP 文件，或检查知识库文件是否可用。",
          );
        }
      })();

      renderer.setAnimationLoop(() => {
        controls.update();
        renderer.render(scene, camera);
      });
    </script>
  </body>
</html>
